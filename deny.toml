[advisories]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "CC0-1.0",
]
confidence-threshold = 0.8

# Our workspace crates don't have LICENSE files yet; allow them
exceptions = [
    { allow = ["MIT"], crate = "termesh-core" },
    { allow = ["MIT"], crate = "termesh-pty" },
    { allow = ["MIT"], crate = "termesh-terminal" },
    { allow = ["MIT"], crate = "termesh-renderer" },
    { allow = ["MIT"], crate = "termesh-layout" },
    { allow = ["MIT"], crate = "termesh-input" },
    { allow = ["MIT"], crate = "termesh-agent" },
    { allow = ["MIT"], crate = "termesh-diff" },
    { allow = ["MIT"], crate = "termesh-platform" },
    { allow = ["MIT"], crate = "termesh-app" },
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
