[advisories]
# Transitive deps may include unmaintained crates; warn but don't block
ignore = [
    "RUSTSEC-2024-0384", # instant (unmaintained, transitive via wgpu)
    "RUSTSEC-2024-0436", # paste (unmaintained, transitive)
    "RUSTSEC-2024-0041", # serial (unmaintained, transitive via portable-pty)
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
